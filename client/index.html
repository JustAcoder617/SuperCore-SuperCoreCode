<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCore</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="st">
        <h1>Bem vindo ao SuperCore, seu novo chatbot pessoal!</h1>
        <hr>
    </div>
    <br>
    <main>
        <h1>Digite sua Pergunta</h1>
        <input type="text" id="ask" required placeholder="Exemplo: `o que significa Comics?`">
    </main>
    <div id="ariab">
        <button type="button" id="enviar">
        Enviar
        </button>
    </div>
    <span id="response"> A resposta irá aparecer aqui!!</span>
    <br>
    <footer>
        <p>
            Ao conversar com o SuperCore, você concorda com os <a href="terms/index.html">Termos de Usuário final do SuperChat.</a>
        </p>
    </footer>
</body>
</html>
